<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPayPlug</title>

<style>
body{
  font-family: Arial;
  background:#0d1117;
  color:white;
  text-align:center;
  padding:40px;
}
.container{
  max-width:800px;
  margin:auto;
}
.card{
  background:#161b22;
  padding:30px;
  margin:20px;
  border-radius:15px;
}
button{
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-size:16px;
}
button:hover{
  background:#1d4ed8;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ SmartPay Plug</h1>
<p>Select your power plan</p>

<div class="card">
  <h2>Quick Charge</h2>
  <p>₹10 • Short Usage</p>
  <button onclick="pay()">Pay ₹10</button>
</div>

<div class="card">
  <h2>Standard Charge</h2>
  <p>₹20 • Medium Usage</p>
  <button onclick="pay()">Pay ₹20</button>
</div>

<div class="card">
  <h2>Extended Charge</h2>
  <p>₹50 • Long Usage</p>
  <button onclick="pay()">Pay ₹50</button>
</div>

</div>

<script>
function pay(){
  window.location.href = "https://rzp.io/rzp/TnMYczJv";
}
</script>

</body>
</html>
