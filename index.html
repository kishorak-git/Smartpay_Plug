<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPayPlug</title>

<style>
body{
  font-family: Arial;
  background:#0d1117;
  color:white;
  margin:0;
}
nav{
  padding:15px;
  background:#161b22;
  text-align:center;
}
nav button{
  margin:5px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
  text-align:center;
}
.card{
  background:#161b22;
  padding:20px;
  margin:15px;
  border-radius:12px;
}
button.pay{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#06b6d4;
  color:white;
  cursor:pointer;
}
.page{display:none;}
.page.active{display:block;}
img{
  width:150px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('payment')">Payment</button>
</nav>

<!-- HOME PAGE (QR) -->
<div id="home" class="page active">
  <div class="container">
    <h1>Scan & Pay</h1>

    <div class="card">
      <h3>₹10 Payment</h3>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rzp.io/rzp/TnMYczJv">
    </div>

    <div class="card">
      <h3>₹20 Payment</h3>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rzp.io/rzp/8uOKYlB5">
    </div>

    <div class="card">
      <h3>₹50 Payment</h3>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rzp.io/rzp/02Y4FFy0">
    </div>

  </div>
</div>

<!-- PAYMENT PAGE (BUTTONS) -->
<div id="payment" class="page">
  <div class="container">
    <h1>Select Plan</h1>

    <div class="card">
      <h3>Quick Charge ₹10</h3>
      <button class="pay" onclick="pay(10)">Pay</button>
    </div>

    <div class="card">
      <h3>Standard Charge ₹20</h3>
      <button class="pay" onclick="pay(20)">Pay</button>
    </div>

    <div class="card">
      <h3>Extended Charge ₹50</h3>
      <button class="pay" onclick="pay(50)">Pay</button>
    </div>

  </div>
</div>

<script>
function showPage(page){
  document.getElementById('home').classList.remove('active');
  document.getElementById('payment').classList.remove('active');
  document.getElementById(page).classList.add('active');
}

function pay(amount){
  if(amount === 10){
    window.location.href = "https://rzp.io/rzp/TnMYczJv";
  } 
  else if(amount === 20){
    window.location.href = "https://rzp.io/rzp/8uOKYlB5";
  } 
  else if(amount === 50){
    window.location.href = "https://rzp.io/rzp/02Y4FFy0";
  }
}
</script>

</body>
</html>
